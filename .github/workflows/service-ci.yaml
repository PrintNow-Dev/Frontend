name: CI/CD

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
permissions:
  contents: read
  packages: write

jobs:
  pipeline:
    uses: PrintNow-Dev/PrintNow/.github/workflows/frontend.yml@dev

    with:
      service: "frontend"
      image: "ghcr.io/printnow-dev/user-service"
      trigger: ${{ github.event_name }}

    secrets: inherit